name: ESRGAN CI/CD Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Dataset Preparation Check
        run: |
          python dataset/download_div2k.py --num_train 5 --num_valid 2

      - name: Model & Pipeline Unit Check
        run: |
          python -c "import torch; from models.generator import RRDBNet; m=RRDBNet(); x=torch.randn(1,3,128,128); print('Output shape:', m(x).shape)"

      - name: Run Short Training Verification
        run: |
          python train.py --epochs 1 --batch_size 2

      - name: Run Evaluation Benchmark
        run: |
          python test.py
